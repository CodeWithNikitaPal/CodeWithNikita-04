<!DOCTYPE html>
<html>
    <head>
        <title>Registration form</title>
    </head>

    <body>
        <h3>Registration Form</h3>
        <form>
            Username : <input type = "text" placeholder = "Enter your username">
            <br>
            <br>
            Password : <input type = "password" placeholder = "Password">
            <br>
            <hr>
            <p>Select your Gender</p>
             <label for="11">
             <input type = "radio" value = "Male" name = "option" id = "11" > Male
             </label>

             <label for="12">
             <input type = "radio" value = "Female" name = "option" id = "12" > Female
             </label>
             <br>
             <hr>
             <p>select your Hobbies</p>
             <label for="Singing">
                <input type = "checkbox" value = "Singing" name = "hobbies" id ="101">Singing
             </label>
             <br>
             <label for="Dancing">
                <input type = "checkbox" value = "Dancing" name = "hobbies" id ="102">Dancing
             </label>
             <br>
             <label for="Panting">
                <input type = "checkbox" value = "Panting" name = "hobbies" id ="103">Panting
             </label>
             <br>
             <label for="cooking">
                <input type = "checkbox" value = "cooking" name = "hobbies" id ="104">cooking
             </label>
             <br>
             <hr>
             <p>select your state</p>
             <select name = "state" id = "state">
                <option value= "" selected disabled>select state
                </option>
                <option value = "Maharashtra">Maharashtra</option>
                <option value = "Madhya Pradesh">Madhya Pradesh</option>
                <option value = "Gujrat">Gujrat</option>
                <option value = "Panjab">Panjab</option>
             </select>
             <br>
             <hr>
             <textarea name = "feedback" placeholder = "please give your valueble feedback" id = "1001" rows = "4"></textarea>
             <hr>
             <input type = "submit" value = "submit">
        </form>
    </body>
</html>
